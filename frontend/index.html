<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de facturas</title>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- font de simbolos -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="styles.css?v=2">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="material-symbols-outlined logo-icon">database</span>
                <h2>Gestor de Facturas</h2>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">

                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="loadContent(event, 'Clientes')">
                            <span class="material-symbols-outlined">group</span>
                            <span class="nav-text">Clientes</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="loadContent(event, 'Facturar')">
                            <span class="material-symbols-outlined">receipt_long</span>
                            <span class="nav-text">Facturar</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="loadContent(event, 'Inventario')">
                            <span class="material-symbols-outlined">category</span>
                            <span class="nav-text">Inventario</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="loadContent(event, 'Productos')">
                            <span class="material-symbols-outlined">inventory_2</span>
                            <span class="nav-text">Productos</span>
                        </a>
                    </li>

                </ul>
            </nav>
        </aside>

        <!-- principal -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">Panel de Control</h1>
                <div class="user-profile">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span>Administrador</span>
                </div>
            </header>

            <section class="content-area" id="content-area">
                <div class="welcome-card">
                    <div class="card-icon">
                        <span class="material-symbols-outlined">dashboard</span>
                    </div>
                    <h2>Sistema de Gestión de Facturas</h2>
                    <p>Bienvenido.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Contenedor del Modal Genérico -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title">Título del Modal</h3>
                <button type="button" class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Se inyecta dinámicamente el contenido -->
            </div>
        </div>
    </div>

    <!-- Contenedor para Notificaciones Toast -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>

</html>
